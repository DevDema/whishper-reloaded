          echo "tag=$GIT_TAG" >> $GITHUB_OUTPUT
          {
            echo "tags<<EOF"
            echo "thespartan94/whishper-backend:$GIT_TAG"
            if [ "$PUBLISH_LATEST" == "true" ]; then
