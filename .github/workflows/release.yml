name: Release

on:
  # Trigger 1: Automatically on pushing a tag like 'v1.2.3'
  push:
    tags:
      - 'v*'
  # Trigger 2: Manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'The existing git tag to build from (e.g., v4.1.3)'
        required: true
        type: string
      publish_latest:
        description: 'Also update the :latest tag on Docker Hub'
        required: false
        type: boolean
        default: true
      docker_tag:
        description: 'Extra Docker tag to push instead of latest (e.g. beta, nightly). Only used when publish_latest is false.'
        required: false
        type: string
        default: ''

jobs:
  build-and-push-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Determine Tags
        id: get_tags
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            GIT_TAG="${{ github.event.inputs.tag }}"
            PUBLISH_LATEST="${{ github.event.inputs.publish_latest }}"
            DOCKER_TAG="${{ github.event.inputs.docker_tag }}"
          else
            GIT_TAG="${{ github.ref_name }}"
            PUBLISH_LATEST="true"
            DOCKER_TAG=""
          fi
          echo "tag=$GIT_TAG" >> $GITHUB_OUTPUT
          {
            echo "tags<<EOF"
            echo "thespartan94/whishper-frontend:$GIT_TAG"
            if [ "$PUBLISH_LATEST" == "true" ]; then
              echo "thespartan94/whishper-frontend:latest"
            elif [ -n "$DOCKER_TAG" ]; then
              echo "thespartan94/whishper-frontend:$DOCKER_TAG"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Checkout code at the specific tag
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.get_tags.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.get_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
