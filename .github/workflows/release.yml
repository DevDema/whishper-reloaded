            GIT_TAG="${{ github.event.inputs.tag }}"
            PUBLISH_LATEST="${{ github.event.inputs.publish_latest }}"
            DOCKER_TAG="${{ github.event.inputs.docker_tag }}"
          else
            GIT_TAG="${{ github.ref_name }}"
            PUBLISH_LATEST="true"
            DOCKER_TAG=""
